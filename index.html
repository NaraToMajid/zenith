<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Zenith - Social Media Generasi Baru</title>
    <!-- Font Syne & Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Supabase Client Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-white: #ffffff;
            --primary-yellow: #fbbf24;
            --yellow-hover: #f59e0b;
            --text-dark: #1f2937;
            --text-gray: #6b7280;
            --bg-light: #f9fafb;
            --border-light: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --transition-base: all 0.3s ease;
        }

        .dark-mode {
            --primary-white: #111827;
            --text-dark: #f9fafb;
            --text-gray: #9ca3af;
            --bg-light: #1f2937;
            --border-light: #374151;
        }

        body {
            font-family: 'Syne', sans-serif;
            background-color: var(--primary-white);
            color: var(--text-dark);
            min-height: 100vh;
            position: relative;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Batik Pattern Background */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.03"><path d="M20 20 L30 20 L25 30 Z" fill="%23fbbf24"/><circle cx="70" cy="70" r="5" fill="%23fbbf24"/><path d="M45 45 Q50 40 55 45 Q50 50 45 45" fill="%23fbbf24"/><path d="M80 20 Q85 15 90 20 Q85 25 80 20" fill="%23fbbf24"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
            z-index: -1;
        }

        /* Container */
        .app-container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
        }

        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--border-light) 25%, var(--bg-light) 50%, var(--border-light) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .slide-up {
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Ripple Button Effect */
        .ripple-btn {
            position: relative;
            overflow: hidden;
            transition: var(--transition-base);
        }

        .ripple-btn:after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.7) 10%, transparent 10%);
            background-size: 600% 600%;
            background-position: 50% 50%;
            opacity: 0;
            transition: all 0.5s;
        }

        .ripple-btn:active:after {
            background-size: 0 0;
            opacity: 0.3;
            transition: 0s;
        }

        /* Scale Hover */
        .scale-hover {
            transition: transform 0.3s;
        }

        .scale-hover:hover {
            transform: scale(1.05);
        }

        /* Button Styles */
        .btn-primary {
            background-color: var(--primary-yellow);
            color: var(--text-dark);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-base);
        }

        .btn-primary:hover {
            background-color: var(--yellow-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* Navigation */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 30px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary-yellow);
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-item {
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: var(--transition-base);
        }

        .nav-item:hover {
            background-color: var(--primary-yellow);
            color: var(--primary-white);
        }

        /* Grid Layouts */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }

        /* Cards */
        .post-card {
            background: var(--primary-white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: var(--transition-base);
            border: 1px solid var(--border-light);
        }

        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-menu {
                gap: 15px;
            }
            .posts-grid {
                grid-template-columns: 1fr;
            }
            .profile-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 480px) {
            .app-container {
                padding: 0 10px;
            }
            .nav-menu {
                gap: 10px;
            }
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--primary-white);
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            transform: translateY(-20px);
            transition: all 0.3s;
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            transition: var(--transition-base);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-yellow);
        }

        /* Reels Container */
        .reels-container {
            height: 80vh;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            border-radius: 20px;
            background: black;
        }

        .reel-item {
            height: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Chat Styles */
        .chat-container {
            height: 500px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-light);
            border-radius: 20px;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .chat-message {
            margin-bottom: 15px;
            display: flex;
        }

        .chat-message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 20px;
            background: var(--bg-light);
        }

        .chat-message.user .message-content {
            background: var(--primary-yellow);
            color: var(--text-dark);
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            gap: 10px;
            border-top: 1px solid var(--border-light);
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border-light);
            border-radius: 25px;
        }

        /* Dark Mode Toggle */
        .dark-mode-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary-yellow);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            z-index: 999;
            transition: var(--transition-base);
        }

        .dark-mode-toggle:hover {
            transform: scale(1.1);
        }

        /* Dynamic Link Styles */
        .dynamic-link {
            color: var(--primary-yellow);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="app-container" id="app">
        <!-- Navigation -->
        <nav class="nav-bar" id="mainNav">
            <a href="#" class="logo" onclick="window.zenith.navigate('home')">ZENITH</a>
            <div class="nav-menu" id="navMenu">
                <div class="nav-item" onclick="window.zenith.navigate('home')"><i class="fas fa-home"></i></div>
                <div class="nav-item" onclick="window.zenith.navigate('explore')"><i class="fas fa-compass"></i></div>
                <div class="nav-item" onclick="window.zenith.navigate('reels')"><i class="fas fa-film"></i></div>
                <div class="nav-item" onclick="window.zenith.navigate('dm')"><i class="fas fa-paper-plane"></i></div>
                <div class="nav-item" onclick="window.zenith.navigate('notifications')"><i class="fas fa-heart"></i></div>
                <div class="nav-item" onclick="window.zenith.navigate('profile')"><i class="fas fa-user"></i></div>
                <div class="nav-item" onclick="window.zenith.navigate('ai-chat')"><i class="fas fa-robot"></i></div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <div id="contentArea" class="fade-in">
            <!-- Content will be dynamically loaded here -->
        </div>

        <!-- Dark Mode Toggle -->
        <div class="dark-mode-toggle" onclick="window.zenith.toggleDarkMode()">
            <i class="fas fa-moon"></i>
        </div>

        <!-- Modals -->
        <div class="modal" id="loginModal">
            <div class="modal-content">
                <h2>Login ke Zenith</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="loginUsername" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn-primary ripple-btn">Login</button>
                </form>
                <p style="margin-top: 15px;">Belum punya akun? <a href="#" onclick="window.zenith.showRegister()">Register</a></p>
            </div>
        </div>

        <div class="modal" id="registerModal">
            <div class="modal-content">
                <h2>Daftar Zenith</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="regUsername" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" required>
                    </div>
                    <div class="form-group">
                        <label>Nama Lengkap</label>
                        <input type="text" id="regFullname" required>
                    </div>
                    <div class="form-group">
                        <label>Bio</label>
                        <textarea id="regBio" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn-primary ripple-btn">Register</button>
                </form>
                <p style="margin-top: 15px;">Sudah punya akun? <a href="#" onclick="window.zenith.showLogin()">Login</a></p>
            </div>
        </div>

        <!-- Create Post Modal -->
        <div class="modal" id="createPostModal">
            <div class="modal-content">
                <h2>Buat Postingan</h2>
                <form id="createPostForm">
                    <div class="form-group">
                        <label>Caption</label>
                        <textarea id="postCaption" rows="4" placeholder="Tulis caption... gunakan #hashtag dan @mention"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Upload Media</label>
                        <input type="file" id="postMedia" accept="image/*,video/*" multiple>
                    </div>
                    <div class="form-group">
                        <label>Tipe Postingan</label>
                        <select id="postType">
                            <option value="post">Post Biasa</option>
                            <option value="reel">Reels</option>
                            <option value="thread">Thread</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary ripple-btn">Posting</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Zenith Main Application
        (function() {
            // Supabase Configuration
            const SUPABASE_URL = 'https://mqonelsoqyvrasrzrzfl.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xb25lbHNvcXl2cmFzcnpyemZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU5NjEzOTQsImV4cCI6MjA4MTUzNzM5NH0.exHvN0BA3P71DcZbavZ0DMk8pUEpWQ6VCuH672wEdJ4';
            
            // Initialize Supabase Client
            const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // Global state
            const state = {
                currentUser: null,
                session: null,
                currentPage: 'home',
                darkMode: localStorage.getItem('zenith-darkmode') === 'true',
                dynamicLinks: new Map()
            };

            // DOM Elements
            const contentArea = document.getElementById('contentArea');
            const loginModal = document.getElementById('loginModal');
            const registerModal = document.getElementById('registerModal');
            const createPostModal = document.getElementById('createPostModal');

            // Utility Functions
            const utils = {
                sanitizeHTML: (str) => {
                    const div = document.createElement('div');
                    div.textContent = str;
                    return div.innerHTML;
                },
                extractHashtags: (text) => {
                    return text.match(/#[a-zA-Z0-9_]+/g) || [];
                },
                extractMentions: (text) => {
                    return text.match(/@[a-zA-Z0-9_]+/g) || [];
                },
                showLoading: (element) => {
                    element.innerHTML = '<div class="skeleton" style="height: 200px;"></div>';
                },
                formatNumber: (num) => {
                    if (num >= 1000000) return (num/1000000).toFixed(1) + 'M';
                    if (num >= 1000) return (num/1000).toFixed(1) + 'K';
                    return num.toString();
                },
                generateUniqueId: () => {
                    return Date.now().toString(36) + Math.random().toString(36).substr(2);
                }
            };

            // Database Operations
            const db = {
                // Users table operations
                users: {
                    create: async (userData) => {
                        const { data, error } = await supabaseClient
                            .from('users_almaumed')
                            .insert([{
                                username: userData.username,
                                password: btoa(userData.password), // Simple encoding, should use proper hashing in production
                                fullname: userData.fullname,
                                bio: userData.bio || '',
                                avatar_url: '',
                                verified: false,
                                followers_count: 0,
                                following_count: 0,
                                posts_count: 0,
                                created_at: new Date()
                            }])
                            .select();
                        return { data, error };
                    },
                    findByUsername: async (username) => {
                        const { data, error } = await supabaseClient
                            .from('users_almaumed')
                            .select('*')
                            .eq('username', username)
                            .single();
                        return { data, error };
                    },
                    update: async (userId, updates) => {
                        const { data, error } = await supabaseClient
                            .from('users_almaumed')
                            .update(updates)
                            .eq('id', userId)
                            .select();
                        return { data, error };
                    }
                },

                // Posts operations
                posts: {
                    create: async (postData) => {
                        const { data, error } = await supabaseClient
                            .from('posts_almaumed')
                            .insert([{
                                user_id: postData.user_id,
                                content: postData.content,
                                media_urls: postData.media_urls || [],
                                hashtags: postData.hashtags || [],
                                mentions: postData.mentions || [],
                                type: postData.type || 'post',
                                likes_count: 0,
                                comments_count: 0,
                                created_at: new Date()
                            }])
                            .select();
                        
                        // Create dynamic link for the post
                        if (data && data[0]) {
                            await db.dynamicLinks.create({
                                type: 'post',
                                reference_id: data[0].id,
                                path: `/p/${data[0].id}`
                            });
                        }
                        
                        return { data, error };
                    },
                    getFeed: async (userId, limit = 20) => {
                        // Simple algorithm: get posts from followed users + trending posts
                        const { data: following } = await supabaseClient
                            .from('follows_almaumed')
                            .select('following_id')
                            .eq('follower_id', userId);
                        
                        const followingIds = following?.map(f => f.following_id) || [];
                        
                        const { data, error } = await supabaseClient
                            .from('posts_almaumed')
                            .select(`
                                *,
                                users_almaumed!inner(username, fullname, avatar_url, verified)
                            `)
                            .in('user_id', [userId, ...followingIds])
                            .order('created_at', { ascending: false })
                            .limit(limit);
                        
                        return { data, error };
                    },
                    getTrending: async (limit = 20) => {
                        // Get posts with high engagement
                        const { data, error } = await supabaseClient
                            .from('posts_almaumed')
                            .select(`
                                *,
                                users_almaumed(username, fullname, avatar_url, verified)
                            `)
                            .order('likes_count', { ascending: false })
                            .limit(limit);
                        return { data, error };
                    }
                },

                // Dynamic Links
                dynamicLinks: {
                    create: async (linkData) => {
                        const { data, error } = await supabaseClient
                            .from('dynamic_links_almaumed')
                            .insert([{
                                type: linkData.type,
                                reference_id: linkData.reference_id,
                                path: linkData.path,
                                created_at: new Date()
                            }])
                            .select();
                        return { data, error };
                    },
                    getByPath: async (path) => {
                        const { data, error } = await supabaseClient
                            .from('dynamic_links_almaumed')
                            .select('*')
                            .eq('path', path)
                            .single();
                        return { data, error };
                    }
                },

                // AI Chat logs
                aiLogs: {
                    create: async (logData) => {
                        const { data, error } = await supabaseClient
                            .from('ai_logs_almaumed')
                            .insert([{
                                user_id: logData.user_id,
                                prompt: logData.prompt,
                                response: logData.response,
                                created_at: new Date()
                            }])
                            .select();
                        return { data, error };
                    }
                },

                // Admin check
                isAdmin: (username, password) => {
                    return username === 'admin' && password === 'Rantauprapat123';
                }
            };

            // AI Assistant
            const aiAssistant = {
                chat: async (prompt, systemPrompt = '') => {
                    try {
                        const response = await fetch(`https://api.siputzx.my.id/api/ai/gemini?text=${encodeURIComponent(prompt)}&cookie=Zenith&promptSystem=${encodeURIComponent(systemPrompt)}`);
                        const data = await response.json();
                        
                        if (data.status && data.data && data.data.response) {
                            // Clean markdown and return plain text
                            let cleanResponse = data.data.response
                                .replace(/\*\*/g, '')
                                .replace(/\*/g, '')
                                .replace(/`/g, '')
                                .replace(/#/g, '');
                            return cleanResponse;
                        }
                        return 'Maaf, terjadi kesalahan. Silakan coba lagi.';
                    } catch (error) {
                        console.error('AI Chat Error:', error);
                        return 'Maaf, layanan AI sedang tidak tersedia.';
                    }
                },

                getSystemPrompt: () => {
                    return `Anda adalah Zenith AI, asisten pintar untuk platform social media Zenith. 
                    Anda memahami seluruh fitur Zenith termasuk posting, reels, story, DM, hashtags, mentions, 
                    dan algoritma feed. Platform ini dibuat oleh Oradev. 
                    Anda dapat membantu pengguna membuat caption, ide konten, navigasi fitur, dan rekomendasi posting. 
                    Selalu berikan respons yang ramah, informatif, dan hindari markdown.`;
                }
            };

            // Page Renderers
            const pages = {
                home: async () => {
                    if (!state.currentUser) {
                        pages.login();
                        return;
                    }

                    let html = `
                        <div class="slide-up">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                                <h1>Feed</h1>
                                <button class="btn-primary ripple-btn" onclick="window.zenith.showCreatePost()">
                                    <i class="fas fa-plus"></i> Buat Postingan
                                </button>
                            </div>
                            <div id="feedPosts" class="posts-grid">
                    `;

                    // Load skeleton
                    for (let i = 0; i < 6; i++) {
                        html += `<div class="skeleton" style="height: 300px;"></div>`;
                    }
                    
                    html += `</div></div>`;
                    contentArea.innerHTML = html;

                    // Load actual posts
                    try {
                        const { data: posts, error } = await db.posts.getFeed(state.currentUser.id);
                        if (posts) {
                            const postsHtml = posts.map(post => `
                                <div class="post-card scale-hover" onclick="window.zenith.navigate('post/${post.id}')">
                                    <div style="padding: 15px;">
                                        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                                            <img src="${post.users_almaumed.avatar_url || 'https://via.placeholder.com/40'}" 
                                                 style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
                                            <div>
                                                <strong>${post.users_almaumed.username}</strong>
                                                ${post.users_almaumed.verified ? '<i class="fas fa-check-circle" style="color: var(--primary-yellow);"></i>' : ''}
                                            </div>
                                        </div>
                                        <p style="margin-bottom: 10px;">${utils.sanitizeHTML(post.content)}</p>
                                        ${post.media_urls && post.media_urls[0] ? 
                                            `<img src="${post.media_urls[0]}" style="width: 100%; border-radius: 12px; margin-bottom: 10px;">` : ''}
                                        <div style="display: flex; gap: 20px; color: var(--text-gray);">
                                            <span><i class="fas fa-heart"></i> ${utils.formatNumber(post.likes_count)}</span>
                                            <span><i class="fas fa-comment"></i> ${utils.formatNumber(post.comments_count)}</span>
                                        </div>
                                    </div>
                                </div>
                            `).join('');
                            
                            document.getElementById('feedPosts').innerHTML = postsHtml;
                        }
                    } catch (error) {
                        console.error('Error loading feed:', error);
                    }
                },

                explore: async () => {
                    if (!state.currentUser) {
                        pages.login();
                        return;
                    }

                    let html = `
                        <div class="slide-up">
                            <h1 style="margin-bottom: 30px;">Explore</h1>
                            <div style="margin-bottom: 30px;">
                                <input type="text" id="searchInput" placeholder="Cari pengguna, postingan, hashtag..." 
                                       style="width: 100%; padding: 15px; border-radius: 30px; border: 2px solid var(--border-light);">
                            </div>
                            <div id="trendingSection">
                                <h2>Trending</h2>
                                <div class="posts-grid" id="trendingPosts"></div>
                            </div>
                        </div>
                    `;
                    contentArea.innerHTML = html;

                    // Load trending posts
                    const { data: trending } = await db.posts.getTrending();
                    if (trending) {
                        const trendingHtml = trending.map(post => `
                            <div class="post-card scale-hover">
                                <div style="padding: 15px;">
                                    <p>${utils.sanitizeHTML(post.content.substring(0, 100))}...</p>
                                    <div style="color: var(--text-gray); margin-top: 10px;">
                                        <i class="fas fa-heart"></i> ${post.likes_count}
                                    </div>
                                </div>
                            </div>
                        `).join('');
                        document.getElementById('trendingPosts').innerHTML = trendingHtml;
                    }
                },

                reels: () => {
                    if (!state.currentUser) {
                        pages.login();
                        return;
                    }

                    contentArea.innerHTML = `
                        <div class="reels-container" id="reelsContainer">
                            <div class="reel-item" style="background: linear-gradient(45deg, #fbbf24, #f59e0b);">
                                <div style="text-align: center; color: white;">
                                    <h2>Reels 1</h2>
                                    <p>Swipe untuk video berikutnya</p>
                                </div>
                            </div>
                            <div class="reel-item" style="background: linear-gradient(45deg, #f59e0b, #fbbf24);">
                                <div style="text-align: center; color: white;">
                                    <h2>Reels 2</h2>
                                </div>
                            </div>
                            <div class="reel-item" style="background: linear-gradient(45deg, #fbbf24, #f59e0b);">
                                <div style="text-align: center; color: white;">
                                    <h2>Reels 3</h2>
                                </div>
                            </div>
                        </div>
                    `;

                    // Add swipe detection
                    const reelsContainer = document.getElementById('reelsContainer');
                    let startY = 0;
                    
                    reelsContainer.addEventListener('touchstart', (e) => {
                        startY = e.touches[0].clientY;
                    });
                    
                    reelsContainer.addEventListener('touchend', (e) => {
                        const endY = e.changedTouches[0].clientY;
                        const diff = startY - endY;
                        
                        if (Math.abs(diff) > 50) {
                            if (diff > 0) {
                                // Swipe up - next reel
                                reelsContainer.scrollBy({
                                    top: reelsContainer.clientHeight,
                                    behavior: 'smooth'
                                });
                            } else {
                                // Swipe down - previous reel
                                reelsContainer.scrollBy({
                                    top: -reelsContainer.clientHeight,
                                    behavior: 'smooth'
                                });
                            }
                        }
                    });
                },

                profile: async (username = null) => {
                    if (!state.currentUser && !username) {
                        pages.login();
                        return;
                    }

                    let targetUser = state.currentUser;
                    if (username) {
                        const { data } = await db.users.findByUsername(username);
                        targetUser = data;
                    }

                    if (!targetUser) {
                        contentArea.innerHTML = '<h1>User not found</h1>';
                        return;
                    }

                    contentArea.innerHTML = `
                        <div class="slide-up">
                            <div style="display: flex; align-items: center; gap: 30px; margin-bottom: 30px;">
                                <img src="${targetUser.avatar_url || 'https://via.placeholder.com/150'}" 
                                     style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover;">
                                <div>
                                    <h1>${targetUser.username} ${targetUser.verified ? '<i class="fas fa-check-circle" style="color: var(--primary-yellow);"></i>' : ''}</h1>
                                    <p style="margin: 10px 0;">${targetUser.bio || 'No bio yet'}</p>
                                    <div style="display: flex; gap: 30px;">
                                        <div><strong>${targetUser.posts_count || 0}</strong> posts</div>
                                        <div><strong>${targetUser.followers_count || 0}</strong> followers</div>
                                        <div><strong>${targetUser.following_count || 0}</strong> following</div>
                                    </div>
                                    ${username ? '<button class="btn-primary ripple-btn" style="margin-top: 15px;">Follow</button>' : ''}
                                </div>
                            </div>
                            <div class="profile-grid" id="profilePosts">
                                <!-- Posts will be loaded here -->
                            </div>
                        </div>
                    `;
                },

                'ai-chat': () => {
                    if (!state.currentUser) {
                        pages.login();
                        return;
                    }

                    contentArea.innerHTML = `
                        <div class="slide-up">
                            <h1 style="margin-bottom: 30px;">Zenith AI Assistant</h1>
                            <div class="chat-container">
                                <div class="chat-messages" id="aiMessages">
                                    <div class="chat-message ai">
                                        <div class="message-content">
                                            Halo! Saya Zenith AI, asisten pintar Anda. Ada yang bisa saya bantu?
                                        </div>
                                    </div>
                                </div>
                                <div class="chat-input-area">
                                    <input type="text" id="aiPrompt" placeholder="Tanya apapun...">
                                    <button class="btn-primary ripple-btn" onclick="window.zenith.sendAIMessage()">
                                        <i class="fas fa-paper-plane"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                },

                login: () => {
                    loginModal.classList.add('active');
                },

                register: () => {
                    registerModal.classList.add('active');
                }
            };

            // Main Application Object
            window.zenith = {
                // Navigation
                navigate: async (page, param = null) => {
                    state.currentPage = page;
                    
                    // Check for dynamic links
                    if (page.includes('/')) {
                        const [type, id] = page.split('/');
                        const { data: link } = await db.dynamicLinks.getByPath(`/${type}/${id}`);
                        if (link) {
                            // Handle dynamic routing
                            switch(link.type) {
                                case 'post':
                                    // Load post detail
                                    break;
                                case 'profile':
                                    pages.profile(id);
                                    return;
                            }
                        }
                    }
                    
                    if (pages[page]) {
                        if (param) {
                            pages[page](param);
                        } else {
                            pages[page]();
                        }
                    }
                },

                // Auth
                showLogin: () => {
                    registerModal.classList.remove('active');
                    loginModal.classList.add('active');
                },

                showRegister: () => {
                    loginModal.classList.remove('active');
                    registerModal.classList.add('active');
                },

                showCreatePost: () => {
                    createPostModal.classList.add('active');
                },

                // Login handler
                login: async (username, password) => {
                    try {
                        // Check admin
                        if (db.isAdmin(username, password)) {
                            state.currentUser = {
                                id: 'admin',
                                username: 'admin',
                                isAdmin: true
                            };
                            loginModal.classList.remove('active');
                            pages.admin();
                            return;
                        }

                        const { data: user, error } = await db.users.findByUsername(username);
                        if (user && btoa(password) === user.password) {
                            state.currentUser = user;
                            loginModal.classList.remove('active');
                            pages.home();
                        } else {
                            alert('Username atau password salah');
                        }
                    } catch (error) {
                        console.error('Login error:', error);
                        alert('Terjadi kesalahan');
                    }
                },

                // Register handler
                register: async (userData) => {
                    try {
                        const { data, error } = await db.users.create(userData);
                        if (data) {
                            alert('Registrasi berhasil! Silakan login.');
                            registerModal.classList.remove('active');
                            loginModal.classList.add('active');
                        }
                    } catch (error) {
                        console.error('Register error:', error);
                        alert('Terjadi kesalahan');
                    }
                },

                // AI Chat
                sendAIMessage: async () => {
                    const input = document.getElementById('aiPrompt');
                    const prompt = input.value.trim();
                    if (!prompt) return;

                    const messagesDiv = document.getElementById('aiMessages');
                    
                    // Add user message
                    messagesDiv.innerHTML += `
                        <div class="chat-message user">
                            <div class="message-content">${utils.sanitizeHTML(prompt)}</div>
                        </div>
                    `;
                    
                    input.value = '';
                    
                    // Show typing indicator
                    messagesDiv.innerHTML += `
                        <div class="chat-message ai" id="typingIndicator">
                            <div class="message-content">Mengetik...</div>
                        </div>
                    `;
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;

                    // Get AI response
                    const response = await aiAssistant.chat(prompt, aiAssistant.getSystemPrompt());
                    
                    // Remove typing indicator
                    document.getElementById('typingIndicator')?.remove();
                    
                    // Add AI response
                    messagesDiv.innerHTML += `
                        <div class="chat-message ai">
                            <div class="message-content">${utils.sanitizeHTML(response)}</div>
                        </div>
                    `;
                    
                    // Log to database
                    if (state.currentUser) {
                        await db.aiLogs.create({
                            user_id: state.currentUser.id,
                            prompt: prompt,
                            response: response
                        });
                    }
                    
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                },

                // Dark mode toggle
                toggleDarkMode: () => {
                    state.darkMode = !state.darkMode;
                    localStorage.setItem('zenith-darkmode', state.darkMode);
                    if (state.darkMode) {
                        document.body.classList.add('dark-mode');
                    } else {
                        document.body.classList.remove('dark-mode');
                    }
                },

                // Initialize
                init: async () => {
                    // Apply dark mode
                    if (state.darkMode) {
                        document.body.classList.add('dark-mode');
                    }

                    // Check session
                    const savedUser = localStorage.getItem('zenith-user');
                    if (savedUser) {
                        state.currentUser = JSON.parse(savedUser);
                    }

                    // Load initial page
                    pages.home();

                    // Setup form handlers
                    document.getElementById('loginForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        const username = document.getElementById('loginUsername').value;
                        const password = document.getElementById('loginPassword').value;
                        window.zenith.login(username, password);
                    });

                    document.getElementById('registerForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        const userData = {
                            username: document.getElementById('regUsername').value,
                            password: document.getElementById('regPassword').value,
                            fullname: document.getElementById('regFullname').value,
                            bio: document.getElementById('regBio').value
                        };
                        window.zenith.register(userData);
                    });

                    document.getElementById('createPostForm').addEventListener('submit', async (e) => {
                        e.preventDefault();
                        if (!state.currentUser) return;

                        const content = document.getElementById('postCaption').value;
                        const hashtags = utils.extractHashtags(content);
                        const mentions = utils.extractMentions(content);
                        
                        const postData = {
                            user_id: state.currentUser.id,
                            content: content,
                            hashtags: hashtags,
                            mentions: mentions,
                            type: document.getElementById('postType').value
                        };

                        const { data, error } = await db.posts.create(postData);
                        if (data) {
                            alert('Postingan berhasil dibuat!');
                            createPostModal.classList.remove('active');
                            pages.home();
                        }
                    });

                    // Handle modal clicks
                    window.addEventListener('click', (e) => {
                        if (e.target === loginModal) {
                            loginModal.classList.remove('active');
                        }
                        if (e.target === registerModal) {
                            registerModal.classList.remove('active');
                        }
                        if (e.target === createPostModal) {
                            createPostModal.classList.remove('active');
                        }
                    });
                }
            };

            // Initialize when DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', () => window.zenith.init());
            } else {
                window.zenith.init();
            }
        })();
    </script>
</body>
</html>
